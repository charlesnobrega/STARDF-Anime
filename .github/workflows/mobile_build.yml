name: Build Mobile APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile/flutter/**'
      - '.github/workflows/mobile_build.yml'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
          channel: 'stable'
          cache: true

      - name: Create Flutter scaffold and merge our code
        run: |
          # 1. Create a proper Flutter project in a temp dir
          flutter create --org com.stardf --project-name stardf_anime_mobile /tmp/flutter_app
          
          # 2. Copy the generated android/ scaffolding into our project
          #    (this has proper gradlew, gradle wrapper, build files etc.)
          rm -rf mobile/flutter/android
          cp -r /tmp/flutter_app/android mobile/flutter/android
          
          # 3. Copy our lib/ code over the generated one
          rm -rf /tmp/flutter_app/lib
          cp -r mobile/flutter/lib /tmp/flutter_app/lib
          
          # 4. Use our pubspec.yaml
          cp mobile/flutter/pubspec.yaml /tmp/flutter_app/pubspec.yaml
          
          # 5. Update AndroidManifest for internet permission
          MANIFEST=/tmp/flutter_app/android/app/src/main/AndroidManifest.xml
          sed -i 's|<manifest|<manifest xmlns:android="http://schemas.android.com/apk/res/android"|' $MANIFEST 2>/dev/null || true
          # Add internet permission if not present
          grep -q "android.permission.INTERNET" $MANIFEST || \
            sed -i '/<application/i\    <uses-permission android:name="android.permission.INTERNET"/>' $MANIFEST
          
          # 6. Move the fully assembled project back
          rm -rf mobile/flutter_build
          mv /tmp/flutter_app mobile/flutter_build

      - name: Flutter pub get
        working-directory: mobile/flutter_build
        run: flutter pub get

      - name: Build APK (debug)
        working-directory: mobile/flutter_build
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stardf-anime-debug
          path: mobile/flutter_build/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
