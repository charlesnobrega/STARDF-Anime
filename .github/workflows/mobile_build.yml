name: Build Mobile APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile/flutter/**'
      - '.github/workflows/mobile_build.yml'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Create Flutter project scaffold
        run: |
          # Create a temporary Flutter project for android/ scaffolding
          flutter create --org com.stardf --project-name stardf_anime_mobile /tmp/scaffold

          # Remove our incomplete android/ and use the generated one
          rm -rf mobile/flutter/android
          cp -r /tmp/scaffold/android mobile/flutter/android

          # Ensure internet permission is in the manifest
          MANIFEST=mobile/flutter/android/app/src/main/AndroidManifest.xml
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>' "$MANIFEST"
          fi

          # Set minSdkVersion to 21 (required by video_player, chewie, etc.)
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' mobile/flutter/android/app/build.gradle

      - name: Install dependencies
        working-directory: mobile/flutter
        run: flutter pub get

      - name: Build APK (debug)
        working-directory: mobile/flutter
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stardf-anime-debug
          path: mobile/flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
