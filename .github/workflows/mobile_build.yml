name: Build Mobile APK

on:
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [ main, master ]
    paths:
      - 'mobile/**'
      - 'pkg/stardf/**'
      - 'internal/scraper/**'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Search Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install Gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
          channel: 'stable'
          cache: true

      - name: Build Go Core Binding (AAR)
        run: |
          cd mobile
          mkdir -p android
          gomobile bind -v -target=android -o ./android/stardf_core.aar ./bridge.go

      - name: Build APK
        run: |
          cd mobile/flutter
          flutter pub get
          flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stardf-anime-mobile-debug
          path: mobile/flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
