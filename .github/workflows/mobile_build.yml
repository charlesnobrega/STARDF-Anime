name: Build Mobile APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile/flutter/**'
      - '.github/workflows/mobile_build.yml'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Repair and Build Flutter Project
        run: |
          cd mobile/flutter
          # Backup our clean code and config
          cp pubspec.yaml pubspec.bak
          cp -r lib lib_bak
          
          # Regenerate platform folders
          flutter create . --org com.stardf --project-name stardf_anime_mobile
          
          # Restore our code and config
          mv pubspec.bak pubspec.yaml
          rm -rf lib
          mv lib_bak lib

          # Ensure internet permission is in the manifest
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if [ -f "$MANIFEST" ]; then
            if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
              sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>' "$MANIFEST"
            fi
          fi

          # Set minSdkVersion to 21 (required by video_player, chewie, etc.)
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
          fi

          # Fetch dependencies and build
          flutter pub get
          flutter build apk --debug


      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stardf-anime-debug
          path: mobile/flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
