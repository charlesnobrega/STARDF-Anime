name: stardf_anime_mobile
description: StarDF-Anime Mobile - Browse and stream anime on Android.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  http: ^1.1.0
  html: ^0.15.4
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  video_player: ^2.7.2
  chewie: ^1.7.1
  flutter_spinkit: ^5.2.0
  google_fonts: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
